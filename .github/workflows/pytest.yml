name: Run pytest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      R2_URL: ${{ vars.R2_URL }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync
      env:
        UV_LINK_MODE: copy

    - name: Run pytest
      run: uv run pytest
